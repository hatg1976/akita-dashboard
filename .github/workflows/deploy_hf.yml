name: Hugging Face Spaces デプロイ

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # フル履歴を取得（HF push に必要）

      - name: Hugging Face Spaces にプッシュ
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force \
            https://HIDEAKITANIGUCHI:$HF_TOKEN@huggingface.co/spaces/HIDEAKITANIGUCHI/akita-dashboard \
            main
